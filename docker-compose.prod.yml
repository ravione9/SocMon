# Production stack: nginx (static UI + /api + /socket.io) → Node API → Mongo + Redis.
#
# 1) Build the SPA (from repo root) — required; an empty client/dist often shows as HTTP 403 from nginx:
#      cd client && npm ci && npm run build
# 2) Set CORS_ORIGIN in ../.env to the URL users open in the browser (scheme + host + port), e.g. http://YOUR_SERVER
# 3) If you still get 403 after building: host paths must be readable/traversable by the container (nginx user ~101).
#      chmod -R a+rX client/dist && chmod a+x . client client/dist
#    SELinux (RHEL/CentOS): append ,Z to the dist volume line (e.g. :ro,Z) or use the baked nginx image below.
# 4) Start:
#      docker compose -f docker-compose.prod.yml up -d --build
#
# UI: port 80. The API is only reachable via nginx, not published directly.
#
# Optional — bake the UI into an image instead of ./client/dist:
#   docker build -f docker/nginx/Dockerfile -t netpulse-nginx .
#   Then run that image with the same default.conf, or swap the nginx service to use image: netpulse-nginx
#   without the client/dist volume.

name: netpulse-prod

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: netpulse-prod-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./client/dist:/usr/share/nginx/html:ro
    depends_on:
      server:
        condition: service_started
    networks:
      - netpulse
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    container_name: netpulse-prod-server
    expose:
      - "5000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    volumes:
      - ./certs:/app/certs:ro
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - netpulse
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: netpulse-prod-mongo
    volumes:
      - mongo-data-prod:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: netpulse_dev
      MONGO_INITDB_DATABASE: netpulse
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netpulse
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: netpulse-prod-redis
    command: redis-server --requirepass netpulse_dev
    volumes:
      - redis-data-prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "netpulse_dev", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - netpulse
    restart: unless-stopped

volumes:
  mongo-data-prod:
  redis-data-prod:

networks:
  netpulse:
    driver: bridge
